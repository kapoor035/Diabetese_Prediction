<!DOCTYPE html>
<html >
<head>
  <meta charset="UTF-8">
  <title>Diabetes Predictor</title>
  <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Arimo' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Hind:300' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300' rel='stylesheet' type='text/css'>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("{{ url_for('static', filename='wall.jpg') }}");
    background-size: cover;
    background-position: center;
    color: #fff;
    text-align: center;
}

h1 {
    margin-top: 40px;
    font-size: 36px;
    font-weight: 600;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
}

.login {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 50px;
}

form {
    background: rgba(0, 0, 0, 0.7);
    padding: 40px 50px;
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

input {
    width: 450px;
    margin-bottom: 12px;
    padding: 15px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 14px;
}

input::placeholder {
    color: #ccc;
}

input:focus {
    outline: none;
    border: 1px solid #4dff88;
}

button {
    margin-top: 10px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #4dff88, #00c9a7);
    color: #000;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

h2 {
    margin-top: 20px;
    font-size: 20px;
}
</style>
</head>

<body>
<h1> Diabetes Predictor </h1>
 <div class="login">
    <form action="{{ url_for('predict') }}" method="post">
                <input class="form-input" type="number" step="any" name="pregnancies" placeholder="Number of Pregnancies eg. 0"><br>
                <input class="form-input" type="number" step="any" name="glucose" placeholder="Glucose (mg/dL) eg. 80"><br>
                <input class="form-input" type="number" step="any" name="bloodpressure" placeholder="Blood Pressure (mmHg) eg. 80"><br>
                <input class="form-input" type="number" step="any" name="skinthickness" placeholder="Skin Thickness (mm) eg. 20"><br>
                <input class="form-input" type="number" step="any" name="insulin" placeholder="Insulin Level (IU/mL) eg. 80"><br>
                <input class="form-input" type="number" step="any" name="bmi" placeholder="Body Mass Index (kg/m²) eg. 23.1"><br>
                <input class="form-input" type="number" step="any" name="dpf" placeholder="Diabetes Pedigree Function eg. 0.52"><br>
                <input class="form-input" type="number" step="any" name="age" placeholder="Age (years) eg. 34"><br>
        <button type="submit" class="btn btn-primary btn-block btn-large">Predict</button>
    </form>
    <br>
   <br>
   <h2>{{ prediction_text }}</h2>
</div>
</body>

</html>
